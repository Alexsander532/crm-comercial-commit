spring:
  application:
    name: crm-comercial

  # ================================================================
  # DATASOURCE — Supabase PostgreSQL
  # ================================================================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000

  # ================================================================
  # JPA
  # ================================================================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # ================================================================
  # FLYWAY
  # ================================================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

# ================================================================
# SERVER
# ================================================================
server:
  port: ${SERVER_PORT:8080}

# ================================================================
# JWT
# ================================================================
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
